trigger:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

steps:
  # Install Node.js 22 to match App Service runtime (NODE|22-lts)
  - task: NodeTool@0
    inputs:
      versionSpec: "22.x"
    displayName: "Install Node.js 22"

  # Install dependencies (including dev deps needed for build) and build
  - script: |
      npm ci
      npm run build
      npm test
    displayName: "Install dependencies and build"

  - script: |
      npx playwright install --with-deps chromium
      npm run preview -- --host 127.0.0.1 --port 4173 &
      PREVIEW_PID=$!
      for i in {1..30}; do
        if curl -sf http://127.0.0.1:4173 > /dev/null; then
          break
        fi
        sleep 1
      done
      npm run test:e2e:smoke
      kill $PREVIEW_PID
    displayName: "Run E2E smoke (Playwright Chromium)"

  # Create a ZIP archive including node_modules and build output
  - task: ArchiveFiles@2
    inputs:
      rootFolderOrFile: "$(System.DefaultWorkingDirectory)"
      includeRootFolder: false
      archiveType: "zip"
      archiveFile: "$(Build.ArtifactStagingDirectory)/app.zip"
      replaceExistingArchive: true
      verbose: true
    displayName: "Archive build output"

  # Stop the Azure App Service to prevent file locking
  - task: AzureCLI@2
    inputs:
      azureSubscription: "AzureRM-alphafinanceweb"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        az webapp stop --name alphafinanceweb --resource-group alphafinanceinfo
    displayName: "Stop Azure App Service (alphafinanceweb)"

  # Deploy to Azure App Service using ZipDeploy
  - task: AzureWebApp@1
    inputs:
      azureSubscription: "AzureRM-alphafinanceweb"
      appType: "webAppLinux"
      appName: "alphafinanceweb"
      package: "$(Build.ArtifactStagingDirectory)/app.zip"
      deploymentMethod: "zipDeploy"
    displayName: "Deploy to Azure App Service (alphafinanceweb)"
    env:
      SYSTEM_DEBUG: true

  # Start the Azure App Service
  - task: AzureCLI@2
    inputs:
      azureSubscription: "AzureRM-alphafinanceweb"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        az webapp start --name alphafinanceweb --resource-group alphafinanceinfo
    displayName: "Start Azure App Service (alphafinanceweb)"

  # Tail logs for debugging
  - task: AzureCLI@2
    inputs:
      azureSubscription: "AzureRM-alphafinanceweb"
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        az webapp log tail --name alphafinanceweb --resource-group alphafinanceinfo
    displayName: "Tail App Service logs"
    condition: failed()
    timeoutInMinutes: 2
